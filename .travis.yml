language: python
python:
  - "3.6"
dist: trusty
# addons:
#   chrome: stable
before_install:
  - sudo apt-get install -y unzip
  - wget -N http://chromedriver.storage.googleapis.com/2.38/chromedriver_linux64.zip
  - unzip chromedriver_linux64.zip
  - chmod +x chromedriver
  - sudo mv -f chromedriver /usr/bin/chromedriver
