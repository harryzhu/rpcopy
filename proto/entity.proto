syntax = "proto3";

package pb;
option go_package=".;pb";

service FileTransfer {
  rpc StreamReceive(stream File) returns (stream File) {}
  rpc Head(File) returns (File) {}
  rpc GetMisc(Misc) returns (Misc) {}
  rpc PutMisc(Misc) returns (Misc) {}
}

message File {
  int32 status = 1;
  bytes comment = 2;
  int32 chanNum = 3;
  bytes path = 4;
  bytes ftype = 5;
  bytes finfo = 6;
  bytes fsum = 7;
  int64 fsize = 8;
  int32 chunks = 9;
  int32 chunkNum = 10;
  bool  zstd = 11;
  bytes data = 12;
}

message Misc {
  string mtype = 1;
  bytes data = 2;
}

